version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cnpj_rfb
      POSTGRES_USER: cnpj
      POSTGRES_PASSWORD: cnpj123
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    command: >
      postgres
        -c shared_buffers=512MB
        -c work_mem=64MB
        -c maintenance_work_mem=512MB
        -c max_wal_size=2GB

  redis:
    image: redis:7.2-alpine
    ports: ["6379:6379"]

volumes:
  pgdata:
